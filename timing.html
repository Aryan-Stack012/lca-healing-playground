<!doctype html><html><head><meta charset="utf-8"><title>Timing - heal playground</title>
<style>body{font-family:system-ui,Arial;max-width:700px;margin:32px auto;padding:0 16px}button{padding:10px 16px}code{background:#f3f3f3;padding:1px 5px}</style></head>
<body><h2>Late-arriving element</h2>
<p style="color:#777;font-size:13px"><code>?delay=ms</code> (default 5000) before the button appears. A huge delay = genuine timeout (timing, not a heal).</p>
<div id="zone">loading...</div><div id="result"></div>
<script>
var d=parseInt(new URLSearchParams(location.search).get('delay')||'5000',10);
setTimeout(function(){document.getElementById('zone').innerHTML='<button id="checkout" aria-label="Checkout">Checkout</button>';document.querySelector('#zone button').onclick=function(){document.getElementById('result').textContent='clicked';};},d);
</script></body></html>
