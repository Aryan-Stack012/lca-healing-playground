<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Late element · LCA Playground</title>
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="timing.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Intelligent wait</span>
      <h1>Late-arriving element</h1>
      <p class="page__note"><code>?delay=ms</code> (default 5000) before the button appears — exercises intelligent wait. A huge delay is a genuine timeout (timing, not a heal).</p>
    </header>
    <section class="stage">
      <div class="stage__head"><span class="eyebrow">device under test</span><span class="dotrow"><i></i><i></i><i></i></span></div>
      <div id="zone">loading…</div>
      <div id="result"></div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  var d=parseInt(new URLSearchParams(location.search).get('delay')||'5000',10);
  setTimeout(function(){document.getElementById('zone').innerHTML='<button id="checkout" aria-label="Checkout">Checkout</button>';document.querySelector('#zone button').onclick=function(){document.getElementById('result').textContent='clicked';};},d);
  </script>
</body>
</html>
