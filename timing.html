<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Late element · LCA Playground</title>
<meta name="description" content="The Checkout action appears after ?delay=ms (default 5000) — exercises intelligent wait, not a heal. A very large delay is a genuine timeout.">
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="timing.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Intelligent wait</span>
      <h1>Cart</h1>
      <p class="page__note">The Checkout action loads after <code>?delay=ms</code> (default 5000) — this exercises intelligent wait, not a heal. A very large delay is a genuine timeout.</p>
    </header>

    <section class="surface">
      <div class="surface__head"><h2 class="surface__title">Your cart</h2><span class="badge badge--warn" id="loadBadge" role="status" aria-live="polite">loading</span></div>
      <div class="surface__body stack">
        <div class="item">
          <span class="thumb">AH</span>
          <div><div class="item__name">Aurora Wireless Headphones</div><div class="item__meta">Midnight · Qty 1</div></div>
          <span class="item__price">$79.00</span>
        </div>
        <div class="rows">
          <div class="row row--total"><span class="row__k">Total</span><span class="row__v">$79.00</span></div>
        </div>
        <hr class="divider">
        <div id="zone"><span class="spinner"></span> <span class="meta">Loading checkout…</span></div>
        <div id="result" aria-live="polite"></div>
      </div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  // malformed / negative ?delay falls back to the documented default; huge delays stay
  // legal (a genuine timeout is the point) but are clamped to setTimeout's 32-bit max
  var d=parseInt(new URLSearchParams(location.search).get('delay'),10);
  if(!isFinite(d)||d<0) d=5000;
  d=Math.min(d,2147483647);
  setTimeout(function(){
    document.getElementById('zone').innerHTML='<button id="checkout" class="btn-primary" aria-label="Checkout">Checkout</button>';
    document.querySelector('#zone button').onclick=function(){var r=document.getElementById('result');r.textContent='✅ Checkout clicked';r.className='is-ok';};
    var b=document.getElementById('loadBadge'); if(b){b.textContent='ready'; b.className='badge badge--ok';}
  },d);
  </script>
</body>
</html>
