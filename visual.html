<!doctype html><html><head><meta charset="utf-8"><title>Visual - heal playground</title>
<style>body{font-family:system-ui,Arial;max-width:700px;margin:32px auto;padding:0 16px}#box{width:240px;height:120px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px}</style></head>
<body><h2>Visual (changes every load)</h2>
<p style="color:#777;font-size:13px">The box colour and number randomise on each load, so a visual baseline never matches -> visual mismatch is a real failure, never healed.</p>
<div id="box"></div>
<script>
var c=['#e8453c','#0b66ff','#0a0','#a05ad6','#f29d0b'][Math.floor(Math.random()*5)],n=Math.floor(Math.random()*1000),b=document.getElementById('box');
b.style.background=c;b.textContent=n;
</script></body></html>
