<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iFrame + Shadow DOM · LCA Playground</title>
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="frames.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Cross-boundary heal</span>
      <h1>iFrame + Shadow DOM</h1>
      <p class="page__note">Break via the shared flag (same URL). Overrides: <code>?v=2</code> / <code>localStorage.lcaBreak=1</code>. The heal must re-find the same Checkout button across both boundaries.</p>
    </header>
    <section class="stage">
      <div class="stage__head"><span class="eyebrow">device under test</span><span class="dotrow"><i></i><i></i><i></i></span></div>
      <h2 class="sub">iFrame</h2>
      <iframe id="frame" title="f" class="frame"></iframe>
      <h2 class="sub">Shadow DOM</h2>
      <div id="host"></div>
      <div id="sresult"></div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  lcaBreak().then(function(v2){
    var fid=v2?'f2':'frame-checkout',sid=v2?'s2':'shadow-checkout',label=v2?'Pay':'Checkout';
    document.getElementById('frame').srcdoc='<!doctype html><body style="margin:0;display:flex;align-items:center;padding:16px;font-family:system-ui,sans-serif;background:#0C111E"><button id="'+fid+'" aria-label="Checkout" style="font:600 15px system-ui;background:#5BC8FF;color:#04202C;border:0;border-radius:10px;padding:11px 18px;cursor:pointer">'+label+'</button></body>';
    var sh=document.getElementById('host').attachShadow({mode:'open'});
    sh.innerHTML='<style>button{font:600 15px system-ui;background:#5BC8FF;color:#04202C;border:0;border-radius:10px;padding:11px 18px;cursor:pointer}</style><button id="'+sid+'" aria-label="Checkout">'+label+'</button>';
    sh.querySelector('button').addEventListener('click',function(){document.getElementById('sresult').textContent='shadow clicked';});
  });
  </script>
</body>
</html>
