<!doctype html><html><head><meta charset="utf-8"><title>Frames & Shadow - heal playground</title><style>body{font-family:system-ui,Arial;max-width:700px;margin:32px auto;padding:0 16px}button{padding:10px 16px;border-radius:6px;border:1px solid #888;cursor:pointer}.btn-primary,.cta{background:#0b66ff;color:#fff;border-color:#0b66ff}.decoy{background:#eee}.menu{display:inline-block;border:1px solid #ccc;border-radius:6px;padding:8px}#result{margin-top:14px;font-weight:600}code{background:#f3f3f3;padding:1px 5px}.muted{color:#777;font-size:13px}</style></head>
<body><h2>iFrame + Shadow DOM</h2>
<p class="muted">Break via the shared flag (same URL). Overrides: <code>?v=2</code> / <code>localStorage.lcaBreak=1</code>.</p>
<h3>iFrame</h3><iframe id="frame" title="f" style="width:100%;height:80px;border:1px solid #ccc"></iframe>
<h3>Shadow DOM</h3><div id="host"></div><div id="sresult"></div>
<script src="flag.js"></script>
<script>
lcaBreak().then(function(v2){
  var fid=v2?'f2':'frame-checkout',sid=v2?'s2':'shadow-checkout',label=v2?'Pay':'Checkout';
  document.getElementById('frame').srcdoc='<!doctype html><body style="font-family:sans-serif"><button id="'+fid+'" aria-label="Checkout">'+label+'</button></body>';
  var sh=document.getElementById('host').attachShadow({mode:'open'});
  sh.innerHTML='<button id="'+sid+'" aria-label="Checkout">'+label+'</button>';
  sh.querySelector('button').addEventListener('click',function(){document.getElementById('sresult').textContent='shadow clicked';});
});
</script></body></html>
