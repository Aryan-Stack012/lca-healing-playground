<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout · LCA Playground</title>
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="checkout.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Primary heal target</span>
      <h1>Checkout</h1>
      <p class="page__note">Break driven by the shared flag (same URL). Toggle via the <b>toggle-heal</b> Action or <code>./toggle.sh</code>: <code>on</code> = relocated + decoy (healable), <code>off</code> = healthy, <code>gone</code> = button removed (unhealable).</p>
    </header>
    <section class="stage">
      <div class="stage__head"><span class="eyebrow">device under test</span><span class="dotrow"><i></i><i></i><i></i></span></div>
      <div id="zone">loading…</div>
      <div id="result"></div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  document.getElementById('zone').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var ok=b.id==='checkout'||b.id==='pay_v2'||b.getAttribute('aria-label')==='Checkout';var r=document.getElementById('result');r.textContent=ok?'✅ Order placed':'❌ Wrong element clicked (decoy)';r.style.color=ok?'#3FE0A6':'#FF7E8C';});
  lcaState().then(function(s){
    var z=document.getElementById('zone');
    if(s==='gone'){ z.innerHTML='<p>(no checkout button — unhealable)</p>'; return; }
    z.innerHTML = s
     ? '<button id="continue_btn" class="decoy">Continue</button> <span class="menu">More &#9662; <button id="pay_v2" class="cta" aria-label="Checkout">Pay</button></span>'
     : '<button id="checkout" class="btn-primary">Checkout</button>';
  });
  </script>
</body>
</html>
