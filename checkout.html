<!doctype html><html><head><meta charset="utf-8"><title>Checkout - heal playground</title><style>body{font-family:system-ui,Arial;max-width:700px;margin:32px auto;padding:0 16px}button{padding:10px 16px;border-radius:6px;border:1px solid #888;cursor:pointer}.btn-primary,.cta{background:#0b66ff;color:#fff;border-color:#0b66ff}.decoy{background:#eee}.menu{display:inline-block;border:1px solid #ccc;border-radius:6px;padding:8px}#result{margin-top:14px;font-weight:600}code{background:#f3f3f3;padding:1px 5px}.muted{color:#777;font-size:13px}</style></head>
<body><h2>Checkout</h2>
<p class="muted">Break driven by the shared flag (same URL). Toggle via the <b>toggle-heal</b> Action or ./toggle.sh: <code>on</code> = relocated+decoy (healable), <code>off</code> = healthy, <code>gone</code> = button removed (UNHEALABLE).</p>
<div id="zone">loading...</div><div id="result"></div>
<script src="flag.js"></script>
<script>
document.getElementById('zone').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;var ok=b.id==='checkout'||b.id==='pay_v2'||b.getAttribute('aria-label')==='Checkout';var r=document.getElementById('result');r.textContent=ok?'✅ Order placed':'❌ Wrong element clicked (decoy)';r.style.color=ok?'#0a0':'#c00';});
lcaState().then(function(s){
  var z=document.getElementById('zone');
  if(s==='gone'){ z.innerHTML='<p>(no checkout button — unhealable)</p>'; return; }
  z.innerHTML = s
   ? '<button id="continue_btn" class="decoy">Continue</button> <span class="menu">More &#9662; <button id="pay_v2" class="cta" aria-label="Checkout">Pay</button></span>'
   : '<button id="checkout" class="btn-primary">Checkout</button>';
});
</script></body></html>
