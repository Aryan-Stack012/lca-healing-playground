<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi-step flow · LCA Playground</title>
<meta name="description" content="Search → Add to cart → Checkout. The shared flag drifts the middle step, forcing a replay to the first failing step.">
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="flow.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Mid-flow drift</span>
      <h1>Guided purchase</h1>
      <p class="page__note">Search → Add to cart → Checkout. The shared flag drifts the middle step (same URL), forcing the run to replay to the first failing step and re-record everything onward.</p>
    </header>

    <section class="surface">
      <div class="surface__head"><h2 class="surface__title">Express purchase</h2><span class="badge badge--info" id="stepBadge" role="status" aria-live="polite">step 1 of 3</span></div>
      <div class="surface__body">
        <div class="stepper" aria-hidden="true">
          <span class="step" data-step="0"><span class="step__n">1</span> Search</span><span class="step__sep"></span>
          <span class="step" data-step="1"><span class="step__n">2</span> Add to cart</span><span class="step__sep"></span>
          <span class="step" data-step="2"><span class="step__n">3</span> Checkout</span>
        </div>

        <div class="searchbar">
          <input id="q" value="wireless headphones" aria-label="Search products" autocomplete="off">
          <div id="s1"><button id="search" class="btn-primary">Search</button></div>
        </div>

        <div id="s2" style="margin-top:var(--s4)"></div>
        <div id="s3" style="margin-top:var(--s4)"></div>
        <div id="result" role="status" aria-live="polite" style="margin-top:var(--s4)"></div>
      </div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  lcaBreak().then(function(v2){
    var addId = v2 ? 'add_v2' : 'add-to-cart';
    var addTxt = v2 ? '+ Cart' : 'Add to cart';
    var steps = document.querySelectorAll('.step');
    var badge = document.getElementById('stepBadge');
    function setStep(active){
      steps.forEach(function(s,i){
        s.classList.remove('is-done','is-active');
        if(i < active) s.classList.add('is-done');
        else if(i === active) s.classList.add('is-active');
      });
      badge.textContent = active >= 3 ? 'complete' : 'step ' + (active + 1) + ' of 3';
    }
    setStep(0);

    var search = document.getElementById('search'), q = document.getElementById('q');

    function doSearch(){
      document.getElementById('s3').innerHTML = '';
      document.getElementById('result').textContent = '';
      document.getElementById('s2').innerHTML =
        '<p class="flowline">1 result for &ldquo;' + (q.value || 'wireless headphones') + '&rdquo;</p>' +
        '<div class="item" style="border:1px solid var(--line);border-radius:var(--r-sm);padding:var(--s3);margin-bottom:var(--s3)">' +
          '<span class="thumb">AH</span>' +
          '<div><div class="item__name">Aurora Wireless Headphones</div><div class="item__meta">In stock · ships free</div></div>' +
          '<span class="item__price">$79.00</span>' +
        '</div>' +
        '<button id="' + addId + '" class="btn-primary" aria-label="Add to cart">' + addTxt + '</button>';
      setStep(1);

      document.getElementById(addId).addEventListener('click', function(){
        document.getElementById('s3').innerHTML =
          '<p class="flowline">Cart · 1 item · $79.00</p>' +
          '<button id="checkout" class="btn-primary" aria-label="Checkout">Checkout</button>';
        setStep(2);

        document.getElementById('checkout').addEventListener('click', function(){
          var r = document.getElementById('result');
          r.textContent = '✅ Order placed';
          r.className = 'is-ok';
          setStep(3);
        });
      });
    }

    search.addEventListener('click', doSearch);
    q.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); doSearch(); } });
  });
  </script>
</body>
</html>
