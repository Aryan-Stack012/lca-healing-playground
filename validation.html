<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation · LCA Playground</title>
<meta name="theme-color" content="#060912">
<link rel="icon" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/playground.css">
</head>
<body data-sub="validation.html">
  <main id="main" tabindex="-1" class="wrap narrow page">
    <header class="page__head">
      <span class="eyebrow">Validation &amp; mismatch legs</span>
      <h1>Validation targets</h1>
      <p class="page__note">Shared flag drifts <code>#status-badge</code> (heal trigger, same URL). <code>?remove=1</code> drops #promo &middot; <code>?wrong=1</code> flips the badge text — validation-failure legs that must never heal.</p>
    </header>
    <section class="stage">
      <div class="stage__head"><span class="eyebrow">device under test</span><span class="dotrow"><i></i><i></i><i></i></span></div>
      <p>Total: <span id="total">$100</span></p>
      <div id="optional"></div>
      <div id="badgezone"></div>
    </section>
  </main>
  <script src="flag.js"></script>
  <script src="assets/page.js"></script>
  <script>
  var p=new URLSearchParams(location.search);
  if(!p.has('remove')){document.getElementById('optional').innerHTML='<p id="promo">Promo applied</p>';}
  lcaBreak().then(function(v2){
    var bid=v2?'status_v2':'status-badge',txt=p.has('wrong')?'Cancelled':'Confirmed';
    document.getElementById('badgezone').innerHTML='<p>Status: <span id="'+bid+'">'+txt+'</span></p>';
  });
  </script>
</body>
</html>
