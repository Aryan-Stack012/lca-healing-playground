name: toggle-heal
on:
  workflow_dispatch:
    inputs:
      state:
        description: 'on = relocated+decoy (healable) | off = healthy | gone = button removed (unhealable)'
        type: choice
        options: [on, off, gone]
        default: on
permissions:
  contents: write
jobs:
  toggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set flag
        run: |
          case "${{ inputs.state }}" in
            on)   echo '{"break": true}'   > flag.json;;
            off)  echo '{"break": false}'  > flag.json;;
            gone) echo '{"break": "gone"}' > flag.json;;
          esac
      - name: Commit
        run: |
          git config user.name "heal-toggle"
          git config user.email "actions@users.noreply.github.com"
          git add flag.json
          git commit -m "toggle heal break -> ${{ inputs.state }}" || echo "no change"
          git push
