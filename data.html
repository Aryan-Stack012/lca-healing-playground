<!doctype html><html><head><meta charset="utf-8"><title>Shared data - heal playground</title><style>body{font-family:system-ui,Arial;max-width:700px;margin:32px auto;padding:0 16px}button{padding:10px 16px;border-radius:6px;border:1px solid #888;cursor:pointer}.btn-primary,.cta{background:#0b66ff;color:#fff;border-color:#0b66ff}.decoy{background:#eee}.menu{display:inline-block;border:1px solid #ccc;border-radius:6px;padding:8px}#result{margin-top:14px;font-weight:600}code{background:#f3f3f3;padding:1px 5px}.muted{color:#777;font-size:13px}</style></head>
<body><h2>Producer / Consumer</h2>
<p class="muted">Producer shows a token to extract; shared flag drifts its id (same URL). Consumer: open <code>?use=HEAL-7421</code>.</p>
<div id="prod"></div><div id="cons"></div>
<script src="flag.js"></script>
<script>
var p=new URLSearchParams(location.search);
lcaBreak().then(function(v2){
  var tid=v2?'token_v2':'token';
  document.getElementById('prod').innerHTML='<p>Token: <span id="'+tid+'">HEAL-7421</span></p>';
  if(p.has('use')){var ok=p.get('use')==='HEAL-7421';document.getElementById('cons').innerHTML='<p>'+(ok?'✅ token matches':'❌ token mismatch')+'</p>';}
});
</script></body></html>
